# ── Qurtaas Ink & Drink — Netlify config ──────────────────────

[build]
  command   = "pnpm install && pnpm build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: every path → index.html so React Router handles routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
